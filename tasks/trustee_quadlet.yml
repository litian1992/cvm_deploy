---
- name: Ensure required packages are installed
  ansible.builtin.package:
    name: "{{ __trustee_attestation_client_trustee_gc_packages }}"
    state: present
    use: "{{ (__trustee_attestation_client_is_ostree | d(false)) |
          ternary('ansible.posix.rhel_rpm_ostree', omit) }}"

- name: Ensure quadlet install directory exists
  ansible.builtin.file:
    path: "{{ trustee_attestation_client_quadlet_install_dir }}"
    state: directory
    mode: "0755"

- name: Create a temporary directory for the quadlet repository
  ansible.builtin.tempfile:
    state: directory
  register: __trustee_attestation_client_quadlet_repo_dir

- name: Download Trustee Guest Components quadlet files from GitHub repository
  ansible.builtin.git:
    repo: "{{ trustee_attestation_client_quadlet_repo_url }}"
    dest: "{{ __trustee_attestation_client_quadlet_repo_dir.path }}"
    version: "{{ trustee_attestation_client_quadlet_repo_branch }}"
    depth: 1
    force: true
  register: quadlet_repo_download

- name: Find Trustee Guest Components quadlet files in repository
  ansible.builtin.find:
    paths: "{{ __trustee_attestation_client_quadlet_repo_dir.path }}/{{ trustee_attestation_client_quadlet_repo_path }}"
    patterns:
      - "*.container"
      - "*.volume"
      - "*.network"
      - "*.kube"
      - "*.pod"
    recurse: false
  register: quadlet_files_found

- name: Fail if no Trustee Guest Components quadlet files found
  ansible.builtin.fail:
    msg: "No quadlet files found in {{ trustee_attestation_client_quadlet_repo_url }}/{{ trustee_attestation_client_quadlet_repo_path }}"
  when: quadlet_files_found.files | length == 0

- name: Copy Trustee Guest Components quadlet files to install directory
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ trustee_attestation_client_quadlet_install_dir }}/{{ item.path | basename }}"
    mode: "0644"
    remote_src: true
    force: true
  loop: "{{ quadlet_files_found.files }}"
  register: quadlet_files_copied

- name: Stat repository configs directory
  ansible.builtin.stat:
    path: "{{ __trustee_attestation_client_quadlet_repo_dir.path }}/configs"
  register: __repo_configs_dir

- name: Copy Trustee Guest Components config files to /etc/trustee-gc/
  ansible.builtin.copy:
    src: "{{ __trustee_attestation_client_quadlet_repo_dir.path }}/configs/"
    dest: /etc/trustee-gc/
    mode: "0644"
    remote_src: true
    force: true
  when: __repo_configs_dir.stat.exists

- name: Replace KBS_URL and KBS_CERT in config.toml files
  ansible.builtin.replace:
    path: "{{ item.path }}"
    regexp: "{{ item.regexp }}"
    replace: "{{ item.replace }}"
  loop:
    - path: /etc/trustee-gc/cdh/config.toml
      regexp: KBS_URL
      replace: "{{ trustee_attestation_client_trustee_kbs_url }}"
    - path: /etc/trustee-gc/cdh/config.toml
      regexp: KBS_CERT
      replace: "{{ trustee_attestation_client_trustee_kbs_cert }}"
    - path: /etc/trustee-gc/aa/config.toml
      regexp: KBS_URL
      replace: "{{ trustee_attestation_client_trustee_kbs_url }}"
    - path: /etc/trustee-gc/aa/config.toml
      regexp: KBS_CERT
      replace: "{{ trustee_attestation_client_trustee_kbs_cert }}"
  when:
    - __repo_configs_dir.stat.exists
    - trustee_attestation_client_trustee_kbs_url != "" or trustee_attestation_client_trustee_kbs_cert != ""

- name: Stat /dev/sev-guest device
  ansible.builtin.stat:
    path: /dev/sev-guest
  register: __sev_guest_device

- name: Add /dev/sev-guest to trustee-gc-aa.container when device exists
  ansible.builtin.replace:
    path: "{{ trustee_attestation_client_quadlet_install_dir }}/trustee-gc-aa.container"
    regexp: '^#AddDevice=/dev/sev-guest'
    replace: 'AddDevice=/dev/sev-guest'
  when: __sev_guest_device.stat.exists

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Get the installed Trustee Guest Components pod name
  ansible.builtin.find:
    paths: "{{ trustee_attestation_client_quadlet_install_dir }}"
    patterns: "*.pod"
  register: trustee_gc_pod_name

- name: Enable and start Trustee Guest Components services
  ansible.builtin.systemd:
    name: "{{ trustee_gc_pod_name.files[0].path | basename | regex_replace('\\.pod$', '') }}-pod.service"
    enabled: true
    state: restarted
    daemon_reload: true
  when: trustee_gc_pod_name.files | length > 0
  failed_when: false

- name: Clean up temporary repository directory
  ansible.builtin.file:
    path: "{{ __trustee_attestation_client_quadlet_repo_dir.path }}"
    state: absent
